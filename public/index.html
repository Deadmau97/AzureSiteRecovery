<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Azure Site Recovery Estimator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <h1>ASR Estimator</h1>
      </div>
      <div class="controls">
        <label>
          Region
          <select id="region"></select>
        </label>
        <label>
          Scenario
          <select id="scenario">
            <option value="onprem">VMware / Hyper-V → Azure</option>
            <option value="a2a">Azure → Azure</option>
          </select>
        </label>
        <label>
          Currency
          <select id="currency">
            <option>EUR</option>
            <option>USD</option>
          </select>
        </label>
        <button id="refreshPrices" class="btn ghost" title="Re-fetch Azure retail prices">↻ Prices</button>
        <span id="status" class="status">…</span>
      </div>
    </header>

    <main>
      <!-- Editor view (hash route #/) -->
      <section id="editor">
        <section class="actions">
          <label class="upload">
            <input type="file" id="rvtoolsFile" accept=".xlsx,.xls,.csv" hidden />
            <span class="btn primary">Upload RVTools export</span>
          </label>
          <button id="addVm" class="btn">
            <svg class="icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 4v12M4 10h12"/></svg>
            <span>Add VM</span>
          </button>
          <button id="exportJson" class="btn ghost">Export JSON</button>
          <label class="btn ghost">
            Import JSON
            <input type="file" id="importJsonFile" accept=".json" hidden />
          </label>
          <button id="estimate" class="btn accent">Estimate →</button>
        </section>

        <section id="warnings" class="warnings hidden"></section>
        <section id="vmList" class="vm-list"></section>
      </section>

      <!-- Results view (hash route #/results, #/results/:vmId) -->
      <section id="results-page" class="hidden">
        <header class="page-header">
          <button id="backToEditor" class="btn ghost">
            <svg class="icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M12 5l-6 5 6 5"/></svg>
            <span>Back to project</span>
          </button>
          <h2 id="resultsTitle">Estimate</h2>
          <span id="resultsMeta" class="muted"></span>
          <button id="downloadPdf" class="btn accent" title="Download estimate as PDF">
            <svg class="icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 3v10M6 9l4 4 4-4M4 16h12"/></svg>
            <span>Download PDF</span>
          </button>
        </header>

        <div id="resultsLoading" class="loading hidden">Calculating…</div>

        <!-- Summary subview -->
        <div id="resultsSummary">
          <div class="totals">
            <div class="card">
              <span class="label">Monthly ASR cost</span>
              <span class="value" id="totalMonthly">—</span>
            </div>
            <div class="card accent">
              <span class="label">24h Test DR cost</span>
              <span class="value" id="totalTest">—</span>
            </div>
          </div>
          <h3 class="section-title">Per-VM breakdown <span class="muted small">— click a VM for details</span></h3>
          <div id="vmSummaryList" class="vm-summary-list"></div>
        </div>

        <!-- Detail subview -->
        <div id="resultsDetail" class="hidden">
          <button id="backToSummary" class="btn ghost back-inline">
            <svg class="icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M12 5l-6 5 6 5"/></svg>
            <span>Back to summary</span>
          </button>
          <div id="vmDetailContent"></div>
        </div>
      </section>
    </main>

    <template id="vmCardTpl">
      <article class="vm-card" data-vm-id>
        <header class="vm-head">
          <input class="vm-name field-flat" placeholder="VM name" />
          <div class="os-toggle" role="radiogroup" aria-label="Operating system">
            <button type="button" class="os-btn" data-os="linux" aria-pressed="true" title="Linux" aria-label="Linux">
              <svg viewBox="0 0 32 32" aria-hidden="true">
                <ellipse cx="16" cy="21" rx="8" ry="8.5" fill="#1a1a1a"/>
                <ellipse cx="16" cy="22" rx="5" ry="6" fill="#ffffff"/>
                <ellipse cx="16" cy="11" rx="6" ry="6.5" fill="#1a1a1a"/>
                <ellipse cx="13.5" cy="10" rx="1.7" ry="2.1" fill="#ffffff"/>
                <ellipse cx="18.5" cy="10" rx="1.7" ry="2.1" fill="#ffffff"/>
                <circle cx="13.7" cy="10.4" r="0.9" fill="#000"/>
                <circle cx="18.3" cy="10.4" r="0.9" fill="#000"/>
                <path d="M14 13 Q16 14.5 18 13 L17 15.5 Q16 16.2 15 15.5 Z" fill="#f5a623"/>
                <ellipse cx="12" cy="29" rx="3.2" ry="1.6" fill="#f5a623"/>
                <ellipse cx="20" cy="29" rx="3.2" ry="1.6" fill="#f5a623"/>
              </svg>
            </button>
            <button type="button" class="os-btn" data-os="windows" aria-pressed="false" title="Windows" aria-label="Windows">
              <svg viewBox="0 0 32 32" aria-hidden="true">
                <rect x="3" y="4" width="12" height="12" rx="1" fill="#f25022"/>
                <rect x="17" y="4" width="12" height="12" rx="1" fill="#7fba00"/>
                <rect x="3" y="18" width="12" height="12" rx="1" fill="#00a4ef"/>
                <rect x="17" y="18" width="12" height="12" rx="1" fill="#ffb900"/>
              </svg>
            </button>
          </div>
          <button class="remove icon-btn icon-btn-danger" title="Remove VM" aria-label="Remove VM">
            <svg class="icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M6 6l8 8M14 6l-8 8"/></svg>
          </button>
        </header>
        <div class="vm-grid">
          <label>vCPU <input type="number" class="vm-vcpu" min="1" value="2" /></label>
          <label>RAM (GiB) <input type="number" class="vm-ram" min="0.5" step="0.5" value="8" /></label>
          <div class="vm-rec">
            <label>DR target VM
              <div class="combo">
                <input type="text" class="vm-target-input" placeholder="Best fit will be suggested..." />
                <ul class="vm-target-results hidden"></ul>
              </div>
            </label>
            <ul class="vm-suggestions"></ul>
          </div>
        </div>
        <div class="disks">
          <div class="disks-head">
            <h3>Disks</h3>
            <button class="add-disk icon-btn" title="Add disk">
              <svg class="icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 5v10M5 10h10"/></svg>
              <span>Add disk</span>
            </button>
          </div>
          <ul class="disk-list"></ul>
        </div>
      </article>
    </template>

    <template id="diskRowTpl">
      <li class="disk-row" data-disk-id>
        <input type="text" class="disk-label field-flat" placeholder="Disk label" />
        <input type="number" class="disk-size" min="1" value="128" /> <span class="muted">GiB</span>
        <select class="disk-family">
          <option>Standard SSD</option>
          <option>Premium SSD</option>
        </select>
        <span class="disk-tier muted"></span>
        <button class="disk-remove icon-btn icon-btn-danger" title="Remove disk" aria-label="Remove disk">
          <svg class="icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M6 6l8 8M14 6l-8 8"/></svg>
        </button>
      </li>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>
    <script src="/app.js" type="module"></script>
  </body>
</html>
